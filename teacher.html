<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher | Generation & Evaluation</title>

    <!-- PDF.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf_viewer.min.css" />

    <link rel="stylesheet" href="CSS/teacher.css" />
</head>

<body>


    <header class="header">
        <nav class="nav">
          <img
            src="img/salma_logo.png"
            alt="SALMA logo"
            class="nav__logo"
            id="logo"
            designer="Omar"
            data-version-number="3.0"
          />
          <ul class="nav__links">
            <li class="nav__item">
                <!-- <a class="nav__link" href="#section--3">Testimonials</a> -->
                <a class="nav__link" href="index.html">Home</a>
              </li>
            <li class="nav__item">
              <a class="nav__link" href="#section--1">Features</a>
            </li>
            <li class="nav__item">
              <a class="nav__link" href="#section--2">Operations</a>
            </li>
            
          </ul>
        </nav>
      </header>
    <!-- <div class="container">
    </div> -->
    <div class="pdf-names-container">
        <label for="pdfInput" id="file-label">Upload PDFs</label>
        <!-- <h3>Uploaded PDFs</h3> -->
        <div class="upload-section">
            <input type="file" id="pdfInput" accept="application/pdf" multiple />
        </div>
        <ul id="pdfList" class="pdf-list"></ul>
    </div>

    <div class="control">
        <button id="prevPage">&larr;</button>
        <input type="number" id="pageNumber" value="1" />
        <button id="nextPage">&rarr;</button>
    </div>

    <div class="main-container">
        <!-- Container for PDF Names -->

        <!-- Container for PDF Viewer -->
        <div class="pdf-viewer-container">
            <div id="viewerContainer">
                <div id="pdfViewer">ff</div>
            </div>
        </div>

        <div class="text-selection">
            <textarea class="text-area" id="selectedText" cols="30" rows="10"></textarea>
            <button class="btn-a btn--show-modal" type="submit">Submit</button>
        </div>
    </div>





    <div class="modal--generate hidden ">
        <button class="btn--close">&times;</button>
        <div class="question">What’s something you tried once and will never try again?</div>
        <div class="answer">Lorem ipsum dolor sit,
            amet consectetur adipisicing elit. Dolore commodi voluptatem,
            itaque porro distinctio quaerat nostrum,
            libero dolores reprehenderit quo id autem minus animi corporis!</div>
        <div class="btns">
            <button class="btn btn--Accept">Accept </button>
            <button class="btn btn--again">Try Again </button>
            <button class="btn btn--cancel">Cancel</button>
        </div>
    </div>

    <div class="overlay hidden"></div>
    <script src="JS/teacher.js"></script>
</body>

</html>
